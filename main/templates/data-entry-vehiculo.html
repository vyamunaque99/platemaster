<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Imagen de Vehículo</title>
    {% load static %}
    <script src="{% static 'js/tailwind.js' %}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 transform transition-all hover:scale-[1.01]">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Ingesta de Placas</h1>
            <p class="text-sm text-gray-500">Sube la imagen en formato PNG del vehículo para procesarla e ingresar los
                datos.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="flex items-center justify-center w-full">
                <label for="de_image"
                    class="flex flex-col items-center justify-center w-full h-64 border-2 border-dashed rounded-xl cursor-pointer bg-slate-50 border-slate-300 hover:bg-blue-50 hover:border-blue-500 transition-colors group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                        <svg class="w-10 h-10 mb-4 text-slate-400 group-hover:text-blue-500 transition-colors"
                            aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2" />
                        </svg>
                        <p class="mb-2 text-sm text-slate-600 group-hover:text-blue-600 transition-colors"><span
                                class="font-semibold">Haz clic para seleccionar</span> o arrastra tu imagen aquí</p>
                        <p class="text-xs text-slate-400">Solo se admiten archivos .PNG</p>
                    </div>
                    <input id="de_image" name="de_image" type="file" accept="image/png" class="hidden" required />
                </label>
            </div>

            <button type="submit"
                class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-semibold rounded-xl text-sm px-5 py-3.5 text-center transition-all shadow-md hover:shadow-lg flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                Procesar Imagen
            </button>
        </form>
    </div>

    <script>
        // Script para mostrar el nombre del archivo seleccionado y una previsualización de éxito
        const fileInput = document.getElementById('de_image');
        const labelContainer = document.querySelector('label[for="de_image"]');
        const textContainer = labelContainer.querySelector('div.flex-col');

        // Guardar el contenido original para restaurarlo si el usuario cancela
        const originalContent = textContainer.innerHTML;

        fileInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                textContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center p-4">
                        <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mb-3">
                            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <p class="text-sm font-semibold text-slate-800 text-center truncate w-full max-w-[200px]">${file.name}</p>
                        <p class="text-xs text-slate-500 mt-1">Listo para procesar</p>
                    </div>
                `;
                labelContainer.classList.add('border-green-400', 'bg-green-50');
                labelContainer.classList.remove('border-slate-300', 'bg-slate-50', 'hover:border-blue-500');
            } else {
                textContainer.innerHTML = originalContent;
                labelContainer.classList.remove('border-green-400', 'bg-green-50');
                labelContainer.classList.add('border-slate-300', 'bg-slate-50', 'hover:border-blue-500');
            }
        });

        // Manejo básico de drag & drop visual
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            labelContainer.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            labelContainer.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            labelContainer.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            labelContainer.classList.add('border-blue-500', 'bg-blue-50');
        }

        function unhighlight(e) {
            labelContainer.classList.remove('border-blue-500', 'bg-blue-50');
        }

        labelContainer.addEventListener('drop', handleDrop, false);
        function handleDrop(e) {
            let dt = e.dataTransfer;
            let files = dt.files;
            fileInput.files = files;
            // Desencadenar manualmente el evento change
            fileInput.dispatchEvent(new Event('change'));
        }
    </script>
</body>

</html>
